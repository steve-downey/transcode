# SPDX-License-Identifier: Apache-2.0 WITH LLVM-exception

name: Makefile Workflow Test

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '30 15 * * *'
permissions:
  contents: read

jobs:
  test_matrix:
    strategy:
      fail-fast: false
    name: Test System Compiler with Makefile
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/bemanproject/infra-containers-gcc:latest
    env:
      VCPKG: ""
      _cmake_args: "-DBUILD_TELEMETRY_CONFIGURATION=TRUE"
    steps:
      # - name: Harden the runner (Audit all outbound calls)
      #   uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
      #   with:
      #     egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          submodules: 'recursive'
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          # Install a specific version of uv.
          version: "0.11.6"

      - name: Install ccache and jq
        shell: bash
        run: |
          curl -fsSL https://github.com/ccache/ccache/releases/download/v4.13.6/ccache-4.13.6-linux-x86_64-glibc.tar.xz \
            | tar xJ --strip-components=1 -C /usr/local/bin ccache-4.13.6-linux-x86_64-glibc/ccache
          curl -fsSL https://github.com/jqlang/jq/releases/download/jq-1.8.1/jq-linux-amd64 \
            -o /usr/local/bin/jq
          chmod +x /usr/local/bin/jq
          curl -fsSL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz \
            | tar xz -C /usr/local/bin gitleaks

      - name: Configure Environment
        shell: bash
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          make venv
        env:
          CMAKE_GENERATOR: "Ninja Multi-Config"
      - name: Build
        shell: bash
        run: |
          source .venv/bin/activate
          make compile
      - name: Test
        shell: bash
        run: |
          source .venv/bin/activate
          make test
      - name: Generate Coverage Files
        shell: bash
        run: |
          source .venv/bin/activate
          make coverage
      - name: Lint
        shell: bash
        run: |
          source .venv/bin/activate
          make lint
      - name: Manual Lint
        shell: bash
        run: |
          source .venv/bin/activate
          make lint
      - name: Test Install
        shell: bash
        run: |
          source .venv/bin/activate
          make testinstall
