# SPDX-License-Identifier: Apache-2.0 WITH LLVM-exception
# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
    -   id: trailing-whitespace
    -   id: end-of-file-fixer
    -   id: check-yaml
    -   id: check-added-large-files

    # Clang-format for C++
    # This brings in a portable version of clang-format.
    # See also: https://github.com/ssciwr/clang-format-wheel
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v22.1.4
    hooks:
    - id: clang-format
      types_or: [c++, c]

    # CMake linting and formatting
  - repo: https://github.com/BlankSpruce/gersemi-pre-commit
    rev: 0.27.2
    hooks:
    - id: gersemi
      name: CMake linting
      exclude: ^.*/tests/.*/data/ # Exclude test data directories

    # Markdown linting
    # Config file: .markdownlint.yaml
    # Requires nodeenv which needs network access to download Node.js.
    # Uncomment when nodeenv/SSL issues are resolved in your environment.
  # - repo: https://github.com/DavidAnson/markdownlint-cli2
  #   rev: v0.17.2
  #   hooks:
  #   - id: markdownlint-cli2

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.2
    hooks:
      - id: codespell
        # docs/whatwg/ contains pristine WHATWG data with Unicode char names
        # (e.g. "LAMDA", "TEH") that are correct Unicode terminology, not typos.
        exclude: ^docs/whatwg/
        args:
          - --ignore-words-list=implementors

  #  MBake Makefile formatting
  - repo: https://github.com/EbodShojaei/bake
    rev: v1.4.5
    hooks:
      - id: mbake-validate

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.13
    hooks:
    - id: ruff
      args: [--fix]
    - id: ruff-format

  - repo: local
    hooks:
      - id: gitleaks
        name: gitleaks
        entry: gitleaks protect --staged --no-banner
        language: system
        pass_filenames: false
      - id: shellcheck
        name: shellcheck
        entry: shellcheck
        language: system
        types: [shell]

    # Beman Standard checking via beman-tidy
    # Disabled until README compliance issues are addressed.
  # - repo: https://github.com/bemanproject/beman-tidy
  #   rev: v0.3.1
  #   hooks:
  #   - id: beman-tidy

exclude: 'template/|copier/|infra/|port/'
